<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — RevConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">Reset Password</div>
        <p class="auth-tagline">We'll verify your identity first.</p>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <!-- Step 1: enter email -->
        <div th:if="${question == null}">
            <form th:action="@{/forgot-password/question}" method="post">
                <div class="form-group">
                    <label class="form-label" for="email">Your email address</label>
                    <input class="form-control" type="email" id="email" name="email"
                           placeholder="you@example.com" required/>
                </div>
                <button class="btn btn-primary" type="submit" style="width:100%;">
                    Find Account
                </button>
            </form>
        </div>

        <!-- Step 2: answer security question and reset -->
        <div th:if="${question != null}">
            <form th:action="@{/forgot-password/reset}" method="post">
                <input type="hidden" name="email" th:value="${email}"/>

                <div class="form-group">
                    <label class="form-label">Security Question</label>
                    <p style="font-size:15px;font-weight:600;color:var(--text-primary);"
                       th:text="${question}">Question</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="answer">Your Answer</label>
                    <input class="form-control" type="text" id="answer" name="answer"
                           placeholder="Answer (case-insensitive)" required/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input class="form-control" type="password" id="newPassword" name="newPassword"
                           placeholder="Choose a new password" required/>
                </div>

                <button class="btn btn-primary" type="submit" style="width:100%;">
                    Reset Password
                </button>
            </form>
        </div>

        <div style="text-align:center;margin-top:16px;font-size:14px;">
            <a th:href="@{/login}" style="color:var(--text-muted);">← Back to login</a>
        </div>
    </div>
</div>
</body>
</html>
