<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Post — RevConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="topbar">
    <a class="topbar-brand" th:href="@{/feed(userId=${userId})}">RevConnect</a>
    <div class="topbar-actions">
        <a class="topbar-btn" th:href="@{/feed(userId=${userId})}">← Cancel</a>
    </div>
</nav>

<div style="max-width:640px;margin:32px auto;padding:0 20px;">
    <div class="card">
        <div class="card-header">✏️ Edit Post</div>
        <div class="card-body">
            <form th:action="@{/posts/{id}/edit(id=${post.postId})}" method="post">
                <input type="hidden" name="userId" th:value="${userId}"/>

                <div class="form-group">
                    <label class="form-label" for="content">Content</label>
                    <textarea class="form-control" id="content" name="content"
                              rows="5" required
                              th:text="${post.content}"></textarea>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <a class="btn btn-outline" th:href="@{/feed(userId=${userId})}">Cancel</a>
                    <button class="btn btn-primary" type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
