<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Login — RevConnect</title>

<link rel="stylesheet" th:href="@{/css/style.css}"/>

</head>

<body class="login-page">

<div class="login-wrapper">

    <!-- LEFT SIDE -->

    <div class="login-left">

        <div class="brand-box">

            <h1>RevConnect</h1>

            <p>
                Connect with professionals,
                share ideas, and grow your network.
            </p>

            <img th:src="@{/images/Screenshot 2026-03-11 134136.png}"
                 alt="Networking Illustration"
                 class="login-image"/>

        </div>

    </div>



    <!-- RIGHT SIDE -->

    <div class="login-right">

        <div class="auth-card">

            <div class="auth-logo">RevConnect</div>

            <p class="auth-tagline">
                Connect, Share, Grow.
            </p>


            <!-- Flash messages -->

            <div class="alert alert-success"
                 th:if="${successMessage}"
                 th:text="${successMessage}">
            </div>

            <div class="alert alert-danger"
                 th:if="${errorMessage}"
                 th:text="${errorMessage}">
            </div>



            <!-- LOGIN FORM -->

            <form th:action="@{/login}" method="post">

                <div class="form-group">

                    <label class="form-label" for="email">
                        Email address
                    </label>

                    <input class="form-control"
                           type="email"
                           id="email"
                           name="email"
                           placeholder="you@example.com"
                           autocomplete="email"
                           required
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                           title="Please enter a valid email address"/>

                </div>



                <div class="form-group">

                    <label class="form-label" for="password">
                        Password
                    </label>

                    <input class="form-control"
                           type="password"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           autocomplete="current-password"
                           required/>

                </div>



                <button class="btn btn-primary"
                        type="submit"
                        style="width:100%;margin-top:8px;">

                    Log In

                </button>

            </form>



            <div class="auth-divider">
                or
            </div>



            <div style="text-align:center;font-size:14px;color:var(--text-secondary);">

                Don't have an account?

                <a th:href="@{/register}" style="font-weight:600;">
                    Sign Up
                </a>

            </div>



            <div style="text-align:center;margin-top:10px;font-size:13px;">

                <a th:href="@{/forgot-password}" style="color:var(--text-muted);">

                    Forgot password?

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
