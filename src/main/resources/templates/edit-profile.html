<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile — RevConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="topbar">
    <a class="topbar-brand" th:href="@{/feed(userId=${userId})}">RevConnect</a>
    <div class="topbar-actions">
        <a class="topbar-btn" th:href="@{/profile(userId=${userId})}">← Back to Profile</a>
    </div>
</nav>

<div style="max-width:600px;margin:32px auto;padding:0 20px;">

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card">
        <div class="card-header">Edit Profile</div>
        <div class="card-body">
            <form th:action="@{/profile/edit}" method="post">
                <input type="hidden" name="userId" th:value="${userId}"/>

                <div class="form-group">
                    <label class="form-label" for="name">Display Name</label>
                    <input class="form-control" type="text" id="name" name="name"
                           th:value="${profile != null ? profile.name : ''}"
                           placeholder="Your display name"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bio">Bio</label>
                    <textarea class="form-control" id="bio" name="bio"
                              rows="3" placeholder="Tell us about yourself…"
                              th:text="${profile != null ? profile.bio : ''}"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="location">Location</label>
                    <input class="form-control" type="text" id="location" name="location"
                           th:value="${profile != null ? profile.location : ''}"
                           placeholder="City, Country"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="websiteLink">Website</label>
                    <input class="form-control" type="url" id="websiteLink" name="websiteLink"
                           th:value="${profile != null ? profile.websiteLink : ''}"
                           placeholder="https://yourwebsite.com"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="profilePic">Profile Picture URL</label>
                    <input class="form-control" type="url" id="profilePic" name="profilePic"
                           th:value="${profile != null ? profile.profilePic : ''}"
                           placeholder="https://example.com/photo.jpg"/>
                </div>

                <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
                    <a class="btn btn-outline" th:href="@{/profile(userId=${userId})}">Cancel</a>
                    <button class="btn btn-primary" type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
